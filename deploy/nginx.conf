# Nginx config for guzellikmerkezi.com.tr
# Place at: /etc/nginx/sites-available/guzellikmerkezi.com.tr
# Enable: ln -s /etc/nginx/sites-available/guzellikmerkezi.com.tr /etc/nginx/sites-enabled/
# Reload: sudo nginx -t && sudo systemctl reload nginx

upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream express_upstream {
    server 127.0.0.1:4000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name guzellikmerkezi.com.tr www.guzellikmerkezi.com.tr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name guzellikmerkezi.com.tr www.guzellikmerkezi.com.tr;

    # SSL — managed by Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/guzellikmerkezi.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guzellikmerkezi.com.tr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Content-Type-Options    nosniff;
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-XSS-Protection         "1; mode=block";
    add_header Referrer-Policy          "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 10M;

    # Static assets from Next.js build (long cache)
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public files (images, fonts, etc.)
    location /images/ {
        root /var/www/guzellikmerkezi/apps/web/public;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Express API — proxied directly to avoid Next.js rewrite overhead
    location /api/ {
        proxy_pass         http://express_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Next.js app
    location / {
        proxy_pass         http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
